services:
  coordinator-1:
    build: .
    environment:
      - NODE_ID=coordinator-1
    command: uvicorn coordinator.main:app --host 0.0.0.0 --port 8000
    ports: ["8001:8000"]

  coordinator-2:
    build: .
    environment:
      - NODE_ID=coordinator-2
    command: uvicorn coordinator.main:app --host 0.0.0.0 --port 8000
    ports: ["8002:8000"]

  coordinator-3:
    build: .
    environment:
      - NODE_ID=coordinator-3
    command: uvicorn coordinator.main:app --host 0.0.0.0 --port 8000
    ports: ["8003:8000"]

  worker-1:
    build: .
    environment:
      - WORKER_ID=worker-1
    command: uvicorn worker.main:app --host 0.0.0.0 --port 8000
    ports: ["8011:8000"]

  worker-2:
    build: .
    environment:
      - WORKER_ID=worker-2
    command: uvicorn worker.main:app --host 0.0.0.0 --port 8000
    ports: ["8012:8000"]